name = "pitchpulse"
main = "src/worker.ts"
compatibility_date = "2026-01-01"

# Secrets (never commit) - set with:
#   wrangler secret put TXLINE_API_KEY
#   wrangler secret put DEEPINFRA_API_KEY   # for live commentary (DeepInfra LLM)
#   wrangler secret put ADMIN_KEY           # gates POST /api/mock-event (+ demo buttons via ?admin=)
# (No Container - a MatchRoom Durable Object polls TxLINE on an alarm, generates commentary,
#  and fans out to embedded widgets over WebSocket.)

# Landing page + embeddable /pitchpulse.js served from ./public.
[assets]
directory = "./public"
binding = "ASSETS"

[[durable_objects.bindings]]
name = "MATCH_ROOM"
class_name = "MatchRoom"

[[migrations]]
tag = "v1"
new_classes = ["MatchRoom"]
